      - DXY was created in 1973 after the collapse of Bretton Woods. The
        composition has been updated only once (1999, when EUR replaced
        individual European currencies).
      - The "dollar smile" theory explains DXY behavior: strong in crisis
        (left side), weak in synchronized global growth (bottom), strong
        in US outperformance (right side).
      - DXY futures trade on ICE. Most retail traders access DXY through
        CFDs which may have different spread and swap costs.
      - DXY above 105 is historically strong USD; below 95 is weak.
        Extreme DXY levels (>110 or <85) often coincide with regime
