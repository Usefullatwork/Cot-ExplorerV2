      1. Commercials (Smart Money - Hedgers):
         Companies that use futures markets to hedge their core business.
         Oil producers hedge oil exposure. Farmers hedge crop exposure.
         Exporters hedge currency exposure. Commercials have SUPERIOR information
         about supply and demand in their industry because they ARE the industry.
         Over 6-12 month horizons, commercials are consistently profitable
         in their hedging, meaning they are consistently on the right side of
         the market at major turning points.
         SIGNAL: When commercials are building positions aggressively (4-week
         change is large), pay attention. They are seeing something that
         speculators are not.

      2. Asset Managers (Smart Money - Institutional):
         Large institutional investors (pension funds, sovereign wealth funds,
         mutual funds). Their positioning reflects long-term strategic views.
         Changes in asset manager positioning are SLOW but MEANINGFUL.
         SIGNAL: When asset managers start reducing a long-held position, it
         signals a strategic shift, not short-term noise.

      3. Leveraged Funds (Dumb Money at Extremes - Speculators):
         Hedge funds and proprietary trading firms. They are momentum-driven
         and tend to be correct in the middle of trends but WRONG at extremes.
         SIGNAL: When leveraged funds are at extreme positioning AND commercials
         are positioned opposite, a reversal is imminent.

      4. Dealers (Market Makers):
         Banks and dealers that facilitate client flow. Their positioning
         reflects MARKET-MAKING, not directional bets. Dealer positioning should
         NOT be used for directional signals. However, extreme dealer positioning
         can indicate a one-sided market where clients are all on the same side.

