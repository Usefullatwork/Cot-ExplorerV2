        of China demand and AUD/USD direction.
      - Australia's household leverage means RBA rate changes have faster
        and larger transmission to the real economy than Fed changes.
      - The AUD-RBA relationship is mediated by the China channel — RBA
        rate alone is insufficient to predict AUD/USD.

