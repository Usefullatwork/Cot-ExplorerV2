      Australia's economy is uniquely exposed to China through commodity
      exports, creating a dual sensitivity (domestic rates + China growth)
      that makes AUD/USD one of the most complex FX pairs to analyze.

      ## RBA Rate Decision Drivers
      The RBA considers:
      1. **Australian CPI**: The primary domestic driver. Australian CPI
         is released quarterly (not monthly), creating lumpy data with
         larger individual-release impact.
      2. **Employment**: Australian employment data (monthly) indicates
         labor market health. Full employment in Australia is
         approximately 4.0-4.5% unemployment.
      3. **Housing Market**: Australia has one of the most leveraged
         household sectors globally. Mortgage rates directly impact
         consumption through the "cash rate channel." RBA hikes hit
         consumers harder than Fed hikes hit US consumers.
      4. **China Channel**: China is 35% of Australian exports. Chinese
         growth slowdown reduces commodity demand (iron ore, coal),
         weakening Australia's terms of trade and reducing the RBA's
         room to maintain high rates.
      5. **Iron Ore Price**: Iron ore is Australia's single largest export.
         Iron ore price above $100/tonne supports AUD; below $80
         weakens AUD regardless of RBA policy.

