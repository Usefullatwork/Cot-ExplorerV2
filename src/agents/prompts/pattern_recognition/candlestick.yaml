prompts:
  # ── Reversal patterns per instrument (12) ──────────────────────────
  - id: reversal_eurusd
    name: "Candlestick Reversal Patterns - EUR/USD"
    category: pattern_recognition
    subcategory: candlestick
    instrument: EURUSD
    model: haiku
    schedule: every_run
    input_schema:
      - daily_ohlc_20
      - h4_ohlc_50
      - key_levels_eurusd
      - atr_14
      - current_trend
    output_schema:
      reversals_found: "list[dict]"
      highest_probability: "dict"
      timeframe: "str"
      confidence: "0.0-1.0"
    prompt: |
      Scan EUR/USD for candlestick reversal patterns on daily and 4H timeframes.
      Look for: hammer, inverted hammer, engulfing, evening/morning star, doji
      at extremes, pin bar. EUR/USD reversal patterns are most reliable at key
      S/R levels and SMA200. Filter by location — only report reversals occurring
      within 0.5 ATR of a key level. Rate each by historical win rate and
      current context. Output JSON only. Never fabricate data.

