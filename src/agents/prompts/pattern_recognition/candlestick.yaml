  # ── Special patterns ───────────────────────────────────────────────
  - id: engulfing_at_level
    name: "Engulfing at Key Level Scanner"
    category: pattern_recognition
    subcategory: candlestick
    instrument: null
    model: sonnet
    schedule: every_run
    input_schema:
      - all_daily_ohlc_5
      - all_key_levels
      - all_atr_14
      - all_trends
    output_schema:
      setups: "list[dict]"
      highest_conviction: "dict"
      confidence: "0.0-1.0"
    prompt: |
      Scan all 12 instruments for engulfing candle patterns occurring at key
      support/resistance levels. An engulfing at a key level is a Grade-A reversal
      signal. The engulfing body must fully contain the prior candle body and occur
      within 0.3 ATR of a significant level. Rank by: level significance, trend
      context (counter-trend at extreme = highest), and candle size relative to
      ATR. This is one of the highest-probability setups in the system.
      Output JSON only. Never fabricate data.

  - id: doji_extreme
    name: "Doji at Extreme Scanner"
    category: pattern_recognition
    subcategory: candlestick
    instrument: null
    model: haiku
    schedule: every_run
    input_schema:
      - all_daily_ohlc_5
      - rsi_14_all
      - bollinger_bands_all
      - all_key_levels
    output_schema:
      setups: "list[dict]"
      highest_conviction: "dict"
      confidence: "0.0-1.0"
    prompt: |
      Scan all 12 instruments for doji candles at price extremes. A doji at an
      extreme is defined as: doji (body <10% of range) + RSI >70 or <30 +
      price at Bollinger Band outer band + near a key S/R level. Triple
      confirmation doji extremes have 65-70% reversal accuracy. The next candle
      after the doji confirms direction. Report only doji with 2+ extreme
      confirmations. Output JSON only. Never fabricate data.
