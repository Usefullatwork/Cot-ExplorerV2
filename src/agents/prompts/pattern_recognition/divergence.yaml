      Scan DXY for RSI divergences. DXY RSI divergence is the most important FX
      signal in the system — a DXY bearish divergence shifts all FX pairs. Weekly
      DXY RSI divergence at the 105-110 range signals secular dollar weakness
      cycle. Bullish divergence at 100 signals dollar strength resumption. All
      FX positions should be reviewed when DXY divergence is detected.
      Output JSON only. Never fabricate data.

