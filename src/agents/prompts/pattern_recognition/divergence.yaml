      Scan NASDAQ 100 for RSI divergences. NAS100 bearish divergence when led by
      narrow mega-cap rally (diverging from equal-weight NAS) is a strong top
      signal. NAS100 RSI divergence vs SPX RSI (NAS100 diverging while SPX is
      not) signals tech-specific weakness. Use 80/20 RSI extremes for NAS100 due
      to its higher momentum characteristics.
      Output JSON only. Never fabricate data.

