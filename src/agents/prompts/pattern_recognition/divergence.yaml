      Scan S&P 500 for RSI divergences. SPX bearish RSI divergence at all-time
      highs is one of the most important cross-asset signals — it precedes 5-10%
      corrections 65% of the time. SPX RSI can stay overbought for weeks in bull
      trends; use weekly RSI divergence for major tops. Cross-reference with
      market breadth (advance-decline line) for confirmation.
      Output JSON only. Never fabricate data.

