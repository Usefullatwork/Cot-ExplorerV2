      Scan GBP/USD for RSI divergences. Cable RSI divergences are most reliable
      at the 1.20-1.40 range extremes. Regular bearish divergence at 1.35+ has
      historically preceded 200-400 pip declines. GBP/USD 4H RSI divergences
      around BoE decision days should be flagged separately as potentially
      event-driven rather than technical.
      Output JSON only. Never fabricate data.

