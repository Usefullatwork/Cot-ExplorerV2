prompts:
  # ── RSI Divergence per instrument (12) ─────────────────────────────
  - id: rsi_divergence_eurusd
    name: "RSI Divergence - EUR/USD"
    category: pattern_recognition
    subcategory: divergence
    instrument: EURUSD
    model: haiku
    schedule: every_run
    input_schema:
      - daily_ohlc_60
      - rsi_14_daily
      - h4_ohlc_100
      - rsi_14_h4
      - swing_highs_lows
    output_schema:
      divergences: "list[dict]"
      divergence_type: "REGULAR_BULLISH | REGULAR_BEARISH | HIDDEN_BULLISH | HIDDEN_BEARISH"
      timeframe: "str"
      confidence: "0.0-1.0"
    prompt: |
      Scan EUR/USD for RSI divergences on daily and 4H. Regular bullish: price
      makes lower low, RSI makes higher low (reversal signal). Regular bearish:
      price makes higher high, RSI makes lower high. Hidden bullish: price makes
      higher low, RSI makes lower low (continuation). EUR/USD RSI divergences
      at the 70/30 extremes are highest probability. Daily divergences are more
      reliable than 4H. Output JSON only. Never fabricate data.

