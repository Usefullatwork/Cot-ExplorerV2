      timeframe: "str"
      confidence: "0.0-1.0"
    prompt: |
      Scan USD/JPY for RSI divergences. USD/JPY bearish RSI divergence near
      intervention zones (150-160) is extremely significant — it confirms
      momentum exhaustion before potential BoJ action. Bullish hidden divergence
      during carry trade trending confirms accumulation. USD/JPY RSI can stay
      overbought longer than most pairs due to carry dynamics.
      Output JSON only. Never fabricate data.

