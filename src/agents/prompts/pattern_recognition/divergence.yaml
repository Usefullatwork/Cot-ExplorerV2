      Scan Silver for RSI divergences. Silver RSI divergences are noisier than
      gold; use daily timeframe only for signals. Silver-gold RSI divergence
      (gold making new high but silver RSI diverging) signals precious metals
      weakness. Bullish RSI divergence at $22-$24 range lows has been a
      reliable bottom signal historically.
      Output JSON only. Never fabricate data.

