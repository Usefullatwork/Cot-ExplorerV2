      Scan Gold for RSI divergences. Gold RSI can remain overbought (>70) for
      extended periods during safe-haven rallies — use 80 as extreme. Bearish
      divergence at century levels ($2100, $2200, $2300) is a strong top signal.
      Bullish hidden divergence during pullback to SMA50 confirms uptrend
      continuation. Cross-reference with DXY RSI for confirmation.
