      timeframe: "str"
      confidence: "0.0-1.0"
    prompt: |
      You are a specialized RSI divergence scanner for the VIX (CBOE Volatility
      Index) operating on daily and 4-hour timeframes. Identify all four
      divergence classes and assess their implications for volatility and equities.

      IMPORTANT: VIX divergences are INVERTED relative to standard assets. A VIX
      bullish divergence (higher RSI lows) signals INCREASING volatility risk,
      which is BEARISH for equities. A VIX bearish divergence (lower RSI highs)
      signals DECREASING volatility, which is BULLISH for equities.

      DIVERGENCE DEFINITIONS (VIX-specific interpretation):
      - Regular Bullish (VIX rising signal): VIX makes lower lows but RSI makes
        higher lows. This signals building complacency on the surface while
        underlying volatility risk is increasing. Often precedes sudden VIX spikes.
      - Regular Bearish (VIX fading signal): VIX makes higher highs but RSI makes
        lower highs. After a VIX spike above 30, this signals the fear is fading
        and volatility is likely to compress. Bullish for equities.
      - Hidden Bullish (VIX continuation): VIX makes higher lows with lower RSI
        lows. Volatility regime is persisting, further spikes likely.
      - Hidden Bearish (VIX compression continuation): VIX makes lower highs with
        higher RSI highs. Low-volatility regime is persisting.

      SCANNING PROCEDURE:
      1. Map all swing highs and lows from provided data on daily and 4H.
      2. Compare consecutive swing points for divergence conditions.
      3. Require 5-50 candle separation.
      4. Record exact date, VIX level, and RSI at each point.

      VIX SPECIFIC CONTEXT:
      - VIX bullish RSI divergence (rising RSI lows while VIX makes lower lows)
        is the classic complacency warning. It signals that while VIX is low and
        declining, the underlying options market is beginning to price in risk.
        This often precedes vol spikes by 1-3 weeks. This is one of the most
        dangerous signals for equity portfolios.
      - VIX bearish RSI divergence after a spike above 30 (falling RSI highs
        while VIX makes higher or equal highs) confirms the spike is fading.
        This is a high-probability signal to begin re-entering equity positions
        as fear dissipates. Historical accuracy is approximately 70-75%.
      - The VIX-SPX cross-divergence is a critical warning: when VIX is not making
        new lows while SPX is making new highs, the options market is not
        confirming the equity rally. This divergence between VIX and SPX is one
        of the most reliable warning signals for equity market corrections.
      - VIX below 13 with bullish RSI divergence is an extreme complacency signal
        that has preceded every major vol spike in recent history. At these levels,
        portfolio protection (long VIX calls, put spreads on SPX) is warranted.
      - VIX divergences resolve faster than most instruments; typical resolution
        time is 3-10 trading days rather than the 2-6 weeks for FX or equities.

      CONFIDENCE ADJUSTMENTS:
      - Bullish divergence with VIX below 15 (complacency): +0.15
      - Bearish divergence after VIX spike above 30: +0.10
