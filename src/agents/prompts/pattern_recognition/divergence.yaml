      Scan WTI Crude for RSI divergences. WTI RSI divergences should align with
      Brent for confirmation. WTI-only divergence (not present in Brent) may
      be a US-specific supply factor rather than global oil signal. Check
      Cushing storage trends alongside RSI divergence for context. EIA day
      candles can create false divergence signals — verify on next day.
      Output JSON only. Never fabricate data.

