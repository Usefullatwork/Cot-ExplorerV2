      confidence: "0.0-1.0"
    prompt: |
      Scan VIX for RSI divergences. VIX bullish RSI divergence (rising RSI lows
      while VIX makes lower lows) signals building complacency that often precedes
      vol spikes. VIX bearish divergence after a spike >30 (falling RSI highs)
      confirms the spike is fading. VIX-SPX divergence (VIX not making new lows
      while SPX makes new highs) is a key warning signal.
      Output JSON only. Never fabricate data.

  # ── Cross-instrument momentum divergence ───────────────────────────
  - id: momentum_divergence
    name: "Cross-Instrument Momentum Divergence"
    category: pattern_recognition
    subcategory: divergence
    instrument: null
    model: sonnet
    schedule: daily
    input_schema:
      - rsi_14_all
      - macd_all
      - stochastic_all
      - price_momentum_20d_all
    output_schema:
      multi_indicator_divergences: "list[dict]"
      strongest_divergence: "dict"
      consensus_signals: "list[dict]"
      confidence: "0.0-1.0"
    prompt: |
      Analyze momentum divergence across multiple indicators (RSI, MACD,
      Stochastic) for all 12 instruments. When 2+ momentum indicators diverge
      from price simultaneously, the reversal probability increases to 70-80%.
      Rank instruments by divergence count and severity. Triple divergence
      (RSI + MACD + Stochastic all diverging) is the highest-conviction reversal
      signal. Flag instruments with consensus (no divergence) as trend-following
      candidates. Output JSON only. Never fabricate data.
