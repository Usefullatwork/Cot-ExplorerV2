    name: "Portfolio Heat - Brent Crude"
    category: risk_assessment
    subcategory: position_sizing
    instrument: Brent
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_brent
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for Brent Crude positions. Brent and WTI are ~0.95
      correlated; holding both is essentially doubling oil exposure. If long both,
      treat as single position for heat calculation. Oil has gap risk on OPEC
      headlines and geopolitical events. Weekend gap risk is elevated during
      Middle East tensions. Max single-instrument heat is 2%.
      Output JSON only. Never fabricate data.

  - id: portfolio_heat_wti
    name: "Portfolio Heat - WTI Crude"
    category: risk_assessment
    subcategory: position_sizing
    instrument: WTI
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_wti
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for WTI Crude positions. WTI has EIA inventory
      risk every Wednesday; if holding into EIA, add 30% volatility buffer.
      WTI is ~0.95 correlated with Brent — check for combined oil exposure.
      Also check AUD/USD correlation (commodity demand proxy). WTI can have
      contract-roll volatility near expiry. Max single-instrument heat is 2%.
      Output JSON only. Never fabricate data.

  - id: portfolio_heat_spx
    name: "Portfolio Heat - S&P 500"
    category: risk_assessment
    subcategory: position_sizing
    instrument: SPX
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_spx
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for S&P 500 positions. SPX is correlated with
      NAS100 (~0.90), AUD/USD (~0.50), and inversely with VIX (~-0.85). Combined
      equity + risk-on FX exposure can create outsized drawdowns in risk-off
      events. If total correlated risk-on heat exceeds 5%, recommend reducing
      the weakest setup. Max single-instrument heat is 2%.
      Output JSON only. Never fabricate data.

  - id: portfolio_heat_nas100
    name: "Portfolio Heat - NASDAQ 100"
    category: risk_assessment
    subcategory: position_sizing
    instrument: NAS100
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_nas100
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for NASDAQ 100 positions. NAS100 has ~1.3x beta
      to SPX; a 1% SPX move = ~1.3% NAS100 move. If holding both SPX and NAS100
      longs, treat NAS100 at 1.3x for correlation-adjusted heat. After-hours
      earnings from mega-caps can cause 2-3% gaps. Max single-instrument heat
      is 1.5% (reduced due to higher beta).
      Output JSON only. Never fabricate data.

  - id: portfolio_heat_dxy
    name: "Portfolio Heat - US Dollar Index"
    category: risk_assessment
    subcategory: position_sizing
    instrument: DXY
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_dxy
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for DXY positions. DXY is inversely correlated
      with EUR/USD (-0.97), GBP/USD (-0.85), gold (-0.40), and positively with
      USD/JPY (+0.60). A DXY long with EUR/USD shorts is highly redundant.
      Sum all USD-directional exposure across FX pairs, gold, and DXY itself
      for true portfolio USD heat. Max DXY-specific heat is 2%.
      Output JSON only. Never fabricate data.

  - id: portfolio_heat_vix
    name: "Portfolio Heat - VIX"
    category: risk_assessment
    subcategory: position_sizing
    instrument: VIX
    model: haiku
    schedule: every_run
    input_schema:
      - open_positions_vix
      - unrealized_pnl
      - atr_14
      - account_equity
      - correlated_positions
    output_schema:
      heat_pct: "float"
      risk_at_stop: "float"
      correlated_risk: "float"
      action: "HOLD | REDUCE | CLOSE | ADD_OK"
      confidence: "0.0-1.0"
    prompt: |
      Calculate portfolio heat for VIX positions. VIX is a hedge instrument;
      long VIX positions should offset equity risk. If long SPX and long VIX,
      the VIX position is a hedge — net heat should be reduced. Short VIX is
      extremely dangerous due to unlimited upside; max short VIX heat is 0.5%.
      VIX can double overnight in crisis events. Factor in VIX futures
      contango/backwardation for roll cost. Output JSON only. Never fabricate data.
