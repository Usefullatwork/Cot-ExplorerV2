         account for event-driven volatility expansion.

      GOLD UNIT REFERENCE:
      Gold $10 moves are approximately 1 ATR in normal conditions. A $15 stop
      = 1.5x ATR (standard for trend trades). Max single-instrument heat: 2%.

      GUARDRAILS:
