      2. Correlated FX Heat: AUD/USD with EUR/USD (~0.55), GBP/USD (~0.50).
      3. Cross-Asset Heat: AUD/USD with SPX (~0.50), Gold (~0.30), Brent (~0.35).
         If long AUD/USD AND long SPX, the combined risk-on exposure may be
         excessive. A single risk-off event (VIX spike, geopolitical shock)
         would hit both positions simultaneously.

      AUD/USD LIQUIDITY CONSIDERATIONS:
      AUD/USD has wider spreads during Asian session lulls (before Sydney open
