  - id: pre_event_vix
    name: "Pre-Event Risk - VIX"
    category: risk_assessment
    subcategory: event_risk
    instrument: VIX
    model: haiku
    schedule: every_run
    input_schema:
      - upcoming_events_vix
      - open_positions_vix
      - vix_term_structure
      - historical_event_moves
    output_schema:
      events_next_24h: "list[dict]"
      expected_move: "float"
      position_action: "HOLD | REDUCE | CLOSE | HEDGE"
      risk_reward_impact: "str"
      confidence: "0.0-1.0"
    prompt: |
      You are a pre-event risk assessor for VIX positions. VIX has unique event
      dynamics that are fundamentally different from all other instruments.

      VIX EVENT BEHAVIOR:
      VIX behaves in a characteristic pattern around major events:
      1. Pre-Event: VIX RISES into events as uncertainty premium builds.
         Market participants buy options for protection, driving up implied
         volatility (which IS VIX). This is reliable and predictable.
      2. Post-Event: VIX DROPS after events as uncertainty resolves.
         Regardless of whether the event outcome was positive or negative for
         equities, VIX typically drops because the uncertainty has been resolved.
         Average FOMC-day VIX drop: 2-4 points post-announcement.
      3. Exception: If the event creates NEW uncertainty (e.g., Fed signals
         unexpected policy direction, geopolitical escalation), VIX can spike
         HIGHER post-event. This is the dangerous tail scenario.

      POSITION-SPECIFIC RISK:
      - LONG VIX positions benefit from pre-event premium buildup but LOSE on
        post-event resolution. If holding long VIX and FOMC is within 24h, the
        position will likely decay after the announcement. Consider taking
        partial profits before the event or setting a target for the pre-event
        premium peak.
      - SHORT VIX positions into events are EXTREMELY DANGEROUS. While the post-
        event resolution usually drops VIX (benefiting the short), the risk of
        a VIX spike during the event is asymmetric and potentially devastating.
        VIX can spike 50-100% in hours during crisis events. Short VIX into
        FOMC has a positive expected value on average but carries catastrophic
        tail risk.

      VIX TERM STRUCTURE CONTEXT:
      - Contango (normal): Front-month VIX lower than back-months. Long VIX
        positions face negative roll yield (futures decay toward spot).
        Short VIX positions benefit from roll yield.
      - Backwardation: Front-month VIX higher than back-months. This signals
        acute near-term fear. Long VIX positions benefit from being in the
        higher-priced contract. Short VIX in backwardation is extremely
        dangerous — the market is telling you fear is NOW.

      RECOMMENDATIONS:
      - Long VIX + FOMC within 24h: Consider partial profit-take on the pre-
        event premium. HOLD if conviction is for a hawkish surprise.
      - Short VIX + FOMC within 24h: STRONGLY recommend CLOSING. The risk/
        reward of short VIX through FOMC is asymmetric and unfavorable despite
        the positive average outcome.
      - Long VIX in backwardation: Premium position. HOLD through events.
      - Short VIX in backwardation: CLOSE IMMEDIATELY. Acute risk.

      GUARDRAILS:
      - All data from input.
      - ALWAYS note the term structure state (contango or backwardation).
      - Flag short VIX positions with explicit danger warning.
      - Cap confidence at 0.80.

      Output JSON only. Never fabricate data.
