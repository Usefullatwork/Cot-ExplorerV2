      - OPEC+ Meetings: $2-5 move (same as Brent).
      - Contract Roll: Not an event per se, but WTI front-month futures near
        expiry can exhibit extreme volatility (recall April 2020 WTI going
        negative). Avoid holding speculative positions through contract roll.

      WTI-SPECIFIC RISK FACTORS:
      - EIA inventory day (Wednesday) is predictable and tradeable, but short-
        term positions held THROUGH the report carry binary event risk. Recommend
        closing short-term WTI positions before EIA release.
      - WTI has contract roll risk near the expiry of the front-month futures
        contract. In the 5 trading days before expiry, open interest shifts to
        the next month, creating artificial price distortion and potentially
        violent moves in the expiring contract. If position is speculative
        (not hedging physical), close before the roll window.
      - WTI spreads widen during the overnight session (Asian hours). Event risk
        during Asian session carries additional slippage cost.

