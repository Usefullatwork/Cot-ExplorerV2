prompts:
  - id: signal_quality
    name: "Signal Quality Gate"
    category: meta
    subcategory: validation
    instrument: null
    model: sonnet
    schedule: every_run
    input_schema:
      - proposed_signals
      - data_quality_report
      - agent_confidence_scores
      - market_conditions
    output_schema:
      approved_signals: "list[dict]"
      rejected_signals: "list[dict]"
      rejection_reasons: "dict[str, str]"
      quality_score: "0.0-1.0"
      confidence: "0.0-1.0"
    prompt: |
      Apply quality gates to all proposed signals before they reach the output.
      Rejection criteria: (1) Based on stale data (>2 hours for intraday, >1 day
      for daily), (2) Confidence below 0.5, (3) Conflicting with higher-timeframe
      bias without explicit override, (4) Within 30 minutes of high-impact event,
      (5) Generated during market anomaly. Only signals passing all gates are
      approved. Report rejection rate — if >50%, system may need recalibration.
      Output JSON only. Never fabricate data.

  - id: rr_validator
    name: "Risk:Reward Ratio Validator"
    category: meta
    subcategory: validation
    instrument: null
    model: haiku
    schedule: every_run
    input_schema:
      - proposed_trades
      - entry_prices
      - stop_levels
      - target_levels
      - atr_all
    output_schema:
      validated_trades: "list[dict]"
      rejected_trades: "list[dict]"
      avg_rr: "float"
      confidence: "0.0-1.0"
    prompt: |
      Validate risk:reward ratios for all proposed trades. Minimum R:R is 1.5:1
      for trend trades and 2.0:1 for counter-trend trades. Validate that stops
      are placed at logical levels (below order blocks, beyond key levels) — not
      just arbitrary ATR multiples. Validate targets are at realistic levels
      (next key level, not arbitrary projections). Reject any trade with R:R
      below minimum or illogical stop/target placement.
      Output JSON only. Never fabricate data.

  - id: consistency_checker
    name: "Signal Consistency Checker"
    category: meta
    subcategory: validation
    instrument: null
    model: haiku
    schedule: every_run
    input_schema:
      - current_signals
      - previous_signals_3_runs
      - price_changes_since_last
    output_schema:
      consistent_signals: "list[dict]"
      flipped_signals: "list[dict]"
      noise_score: "0.0-1.0"
      confidence: "0.0-1.0"
    prompt: |
      Check signal consistency over the last 3 runs. A signal that flips direction
      without a significant price move (>1.5 ATR) is likely noise. Apply a
      smoothing rule: signals must persist for 2 consecutive runs before acting.
      Calculate noise score (0=perfectly consistent, 1=all signals flipping).
      If noise score >0.4, recommend increasing the confluence threshold to
      reduce false signals. Output JSON only. Never fabricate data.

  - id: backtest_alignment
    name: "Backtest Alignment Checker"
    category: meta
    subcategory: validation
    instrument: null
    model: sonnet
    schedule: daily
    input_schema:
      - current_signal_characteristics
      - historical_similar_signals
      - historical_outcomes
      - regime_match
    output_schema:
      alignment_score: "0.0-1.0"
      similar_historical_trades: "list[dict]"
      expected_outcome: "dict"
      confidence: "0.0-1.0"
    prompt: |
      Verify that current signals align with backtested patterns. For each
      proposed trade, find the 10 most similar historical trades (same instrument,
      similar confluence score, similar market regime). Check if those historical
      trades were profitable. If historical win rate for similar setups is <50%,
      flag as misaligned with backtest. Current regime must match historical regime
      for the comparison to be valid.
      Output JSON only. Never fabricate data.
