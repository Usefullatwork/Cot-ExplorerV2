  # ── Daily Trend (12 instruments) ────────────────────────────────────
  - id: daily_trend_eurusd
    name: "Daily Trend Analysis - EUR/USD"
    category: market_analysis
    subcategory: trend
    instrument: EURUSD
    model: haiku
    schedule: every_run
    input_schema:
      - daily_ohlc_200
      - sma200
      - ema9_d1
      - atr_d14
      - current_price
    output_schema:
      trend: "BULLISH | BEARISH | NEUTRAL"
      strength: "0.0-1.0"
      key_levels: "list[float]"
      confidence: "0.0-1.0"
    prompt: |
      Analyze EUR/USD daily price data. EUR/USD is quoted as euros per US dollar;
      a rising price means EUR strengthening vs USD. Determine trend from SMA200
      position, EMA9 slope, and 20-day momentum. Classify BULLISH/BEARISH/NEUTRAL.
      Rate strength 0-1 based on slope steepness and price distance from SMA200.
      Identify 3-5 key S/R levels from recent swing highs/lows.
      Output JSON only. Never fabricate data.

