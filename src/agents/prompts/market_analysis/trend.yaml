  # ── Cross-instrument trend agents ──────────────────────────────────
  - id: multi_tf_alignment
    name: "Multi-Timeframe Trend Alignment"
    category: market_analysis
    subcategory: trend
    instrument: null
    model: sonnet
    schedule: every_run
    input_schema:
      - all_daily_trends
      - all_weekly_trends
      - monthly_candle_data
    output_schema:
      aligned_instruments: "list[dict]"
      conflicting_instruments: "list[dict]"
      strongest_alignment: "str"
      confidence: "0.0-1.0"
    prompt: |
      Compare daily and weekly trend outputs for all 12 instruments. Identify which
      instruments have aligned trends across both timeframes (high conviction) and
      which have conflicting signals (caution). Rank by alignment strength. Flag
      instruments where weekly is transitioning while daily lags. Multi-TF alignment
      is a prerequisite for Grade-A trade signals. Output instruments sorted by
      conviction. Output JSON only. Never fabricate data.

  - id: trend_strength
    name: "Trend Strength Ranking"
    category: market_analysis
    subcategory: trend
    instrument: null
    model: haiku
    schedule: every_run
    input_schema:
      - all_daily_trends
      - adx_14_all
      - atr_percentile_all
    output_schema:
      ranking: "list[dict]"
      strongest_trend: "str"
      weakest_trend: "str"
      avg_strength: "0.0-1.0"
    prompt: |
      Rank all 12 instruments by trend strength using ADX(14), ATR percentile, and
      daily trend strength scores. Identify the strongest trending instrument and
      the weakest/most range-bound. Flag instruments where ADX is rising above 25
      (trend emerging) or falling below 20 (trend exhausting). This ranking informs
      position sizing — stronger trends warrant larger allocations.
      Output JSON only. Never fabricate data.
