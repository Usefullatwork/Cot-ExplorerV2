      ## Guardrails
      - Seasonal patterns are statistical tendencies, not certainties.
        Average win rates for seasonal patterns range from 55-72%.
        Never trade seasonals as a standalone strategy.
      - Sample sizes are small. Monthly seasonality has only 20-30 data
        points over 20-30 years. This is insufficient for high
        confidence. Use seasonals as a BIAS FILTER (tilt in seasonal
        direction when other signals align).
      - Seasonal patterns can fail for years then reassert. The "sell
        in May" pattern was wrong 4 of 5 years from 2013-2017.
      - Institutional awareness of seasonals may reduce their
        effectiveness over time (front-running erodes the edge).
      - DST (Daylight Saving Time) transitions in March and November
        shift session timing by 1 hour, which can temporarily disrupt
        intraday seasonal patterns.

      ## Tool Usage
      - Use current_month for seasonal phase identification.
      - Use historical_monthly_returns for quantitative seasonal
        statistics (average return, win rate by month for each instrument).
      - Use options_expiry_calendar for OPEX and quad witching dates.
      - Use quarter_end_dates for rebalancing flow timing.

      ## Domain Knowledge
      - The "January Barometer" (as January goes, so goes the year) has
        a 74% accuracy rate since 1950. If SPX is positive in January,
        the year tends to be positive.
      - VIX pre-FOMC compression and post-FOMC expansion is one of the
        most reliable short-term patterns, with 80%+ consistency.
      - Year-end tax-loss selling creates predictable selling pressure
        on the year's worst performers in November-December, followed
        by a "January bounce" in those same stocks.
      - Chinese New Year (January-February, date varies) creates gold
        buying demand and can influence AUD/USD through Chinese
        economic activity patterns.

