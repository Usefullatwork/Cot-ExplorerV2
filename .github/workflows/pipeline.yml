name: Pipeline

on:
  schedule:
    # 4x daily: 07:45, 12:30, 14:15, 17:15 CET (UTC+1 in winter, UTC+2 in summer)
    # Using UTC offsets for winter (CET = UTC+1):
    - cron: "45 6 * * 1-5"   # 07:45 CET = 06:45 UTC
    - cron: "30 11 * * 1-5"  # 12:30 CET = 11:30 UTC
    - cron: "15 13 * * 1-5"  # 14:15 CET = 13:15 UTC
    - cron: "15 16 * * 1-5"  # 17:15 CET = 16:15 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/cot-explorer.db
          key: sqlite-${{ github.sha }}
          restore-keys: |
            sqlite-

      - name: Run pipeline
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.pipeline.runner

      - name: Generate static JSON
        run: python -m src.publishers.json_file

      - name: Push signals
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SCALP_API_KEY: ${{ secrets.SCALP_API_KEY }}
        run: python push_signals.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
