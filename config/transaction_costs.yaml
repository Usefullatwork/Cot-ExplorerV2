# Cot-ExplorerV2 Transaction Cost Configuration
# Per-instrument cost parameters for realistic backtest friction.
#
# base_spread: typical spread in pips (from DEFAULT_SPREADS)
# spread_multipliers: session-dependent multiplier on base_spread
# slippage_mean / slippage_std: lognormal slippage parameters (pips)
# swap_long / swap_short: overnight swap cost (pips/day, positive = cost)
# commission_per_lot: round-trip commission in USD (0 for spread-only accounts)

spread_multipliers: &default_multipliers
  asian: 1.8
  london: 0.7
  ny_overlap: 0.75
  ny: 0.85
  off_hours: 2.5

instruments:
  EURUSD:
    base_spread: 1.2
    spread_multipliers: *default_multipliers
    slippage_mean: 0.3
    slippage_std: 0.15
    swap_long: -0.6
    swap_short: 0.1
    commission_per_lot: 0.0

  USDJPY:
    base_spread: 1.4
    spread_multipliers: *default_multipliers
    slippage_mean: 0.4
    slippage_std: 0.2
    swap_long: 0.3
    swap_short: -1.2
    commission_per_lot: 0.0

  GBPUSD:
