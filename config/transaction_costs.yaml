# Cot-ExplorerV2 Transaction Cost Configuration
# Calibrated to Pepperstone Standard Account (spread-only, no commission).
#
# base_spread: average spread in pips (Pepperstone Standard Account typical)
# spread_multipliers: session-dependent multiplier on base_spread
# slippage_mean / slippage_std: lognormal slippage parameters (pips)
# swap_long / swap_short: overnight swap cost (pips/day, positive = cost)
# commission_per_lot: round-trip commission in USD (0 for Standard account)

spread_multipliers: &default_multipliers
  asian: 1.6
  london: 0.8
  ny_overlap: 0.85
  ny: 0.9
  off_hours: 2.2

instruments:
  EURUSD:
    base_spread: 0.77
    spread_multipliers: *default_multipliers
    slippage_mean: 0.2
    slippage_std: 0.1
    swap_long: -0.63
    swap_short: 0.08
    commission_per_lot: 0.0

